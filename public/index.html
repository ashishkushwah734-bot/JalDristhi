<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JalDristhi | Live Infrastructure Command Center</title>
    <!-- Modern Typography -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&family=Inter:wght@400;500&display=swap" rel="stylesheet">
    <!-- Leaflet JS Map Stylesheets -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin=""/>
    <!-- Premium Architecture CSS -->
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div id="map"></div>
    
    <!-- Premium Glassmorphism Overlay UI -->
    <div id="ui-container">
        <div id="sidebar">
            <header class="brand">
                <div class="glowing-orb"></div>
                <div>
                    <h1>JalDristhi</h1>
                    <p>Command Center Official</p>
                </div>
            </header>

            <section class="metrics">
                <div class="metric-card">
                    <span class="label">Total System Reports</span>
                    <span class="value" id="total-count">0</span>
                </div>
                <div class="metric-card">
                    <span class="label">Server Status</span>
                    <span class="value active" id="live-status">Monitoring Live</span>
                </div>
            </section>

            <section class="feed-section">
                <h2>Real-time Feed</h2>
                <div id="feeds-container">
                    <!-- Populated Dynamically via API Polling -->
                </div>
            </section>
        </div>
    </div>

    <!-- Map & Logical Scripts -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
    <script src="app.js"></script>
</body>
</html>
