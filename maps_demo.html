<!DOCTYPE html>
<html>
<head>
    <title>Google Maps Location Integration</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; padding: 20px; background-color: #f9f9f9; }
        .container { max-width: 800px; margin: auto; background: white; padding: 20px; border-radius: 8px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        #map { height: 400px; width: 100%; border-radius: 8px; margin-top: 15px; }
        .controls { margin-bottom: 20px; }
        input[type="text"] { width: calc(100% - 22px); padding: 10px; border: 1px solid #ccc; border-radius: 5px; margin-bottom: 10px; }
        button { padding: 10px 15px; border: none; background: #4285F4; color: white; border-radius: 5px; cursor: pointer; font-size: 14px; }
        button:hover { background: #3367D6; }
        .info { background: #eef2ff; padding: 10px; border-radius: 5px; border-left: 4px solid #4285F4; margin-bottom: 15px; }
    </style>
</head>
<body>

<div class="container">
    <h2>📍 Maps & Location Setup</h2>
    
    <div class="controls">
        <label><b>Search Location (Auto-fill via Places API):</b></label>
        <input type="text" id="search-input" placeholder="Type an address or area to search...">
        
        <button onclick="getUserLocation()">🌍 Use My Current GPS Location</button>
    </div>

    <div class="info">
        <p><strong>Proper Address:</strong> <span id="address-display">Pending...</span></p>
        <p><strong>Coordinates (Lat/Lng):</strong> <span id="coordinates-display">Pending...</span></p>
    </div>

    <div id="map"></div>
</div>

<script>
    let map;
    let marker;
    let geocoder;

    function initMap() {
        const defaultLoc = { lat: 28.6139, lng: 77.2090 }; // Default to New Delhi

        map = new google.maps.Map(document.getElementById("map"), {
            center: defaultLoc,
            zoom: 12,
            mapId: "DEMO_MAP_ID",
            mapTypeControl: false
        });

        marker = new google.maps.marker.AdvancedMarkerElement({
            position: defaultLoc,
            map: map,
            gmpDraggable: true, // User can drag to refine location
        });

        geocoder = new google.maps.Geocoder();

        // 1. Places Autocomplete (Search auto-fill)
        const searchInput = document.getElementById("search-input");
        const autocomplete = new google.maps.places.Autocomplete(searchInput);
        autocomplete.bindTo("bounds", map);

        autocomplete.addListener("place_changed", () => {
            const place = autocomplete.getPlace();
            if (!place.geometry || !place.geometry.location) {
                alert("Details not available for: '" + place.name + "'");
                return;
            }

            if (place.geometry.viewport) {
                map.fitBounds(place.geometry.viewport);
            } else {
                map.setCenter(place.geometry.location);
                map.setZoom(17);
            }
            marker.position = place.geometry.location;
            updateDetails(place.geometry.location, place.formatted_address);
        });

        // 2. Drag marker to decode new location (Reverse Geocoding)
        marker.addListener("dragend", () => {
            geocodeLatLng(marker.position);
        });
    }

    // 3. User Location (GPS)
    function getUserLocation() {
        if (navigator.geolocation) {
            document.getElementById("address-display").innerText = "Fetching GPS...";
            navigator.geolocation.getCurrentPosition(
                (position) => {
                    const pos = { lat: position.coords.latitude, lng: position.coords.longitude };
                    map.setCenter(pos);
                    map.setZoom(16);
                    marker.position = pos;
                    geocodeLatLng(pos); // Get proper address name from GPS coords
                },
                (error) => {
                    alert("Error getting location. Ensure location access is allowed.");
                }
            );
        } else {
            alert("Geolocation is not supported by your browser.");
        }
    }

    // 4. Reverse Geocoding (Lat/Lng -> Address string)
    function geocodeLatLng(latlng) {
        document.getElementById("address-display").innerText = "Connecting to Google...";
        geocoder.geocode({ location: latlng }, (results, status) => {
            if (status === "OK") {
                if (results[0]) {
                    updateDetails(latlng, results[0].formatted_address);
                    document.getElementById("search-input").value = results[0].formatted_address;
                } else {
                    updateDetails(latlng, "No exact address found here");
                }
            } else {
                alert("Geocoder failed due to: " + status);
            }
        });
    }

    function updateDetails(latlng, address) {
        document.getElementById("coordinates-display").innerText = latlng.lat().toFixed(6) + ", " + latlng.lng().toFixed(6);
        document.getElementById("address-display").innerText = address;
    }
</script>

<!-- Replace YOUR_API_KEY with your generated API key from Google Cloud Console -->
<!-- NOTE: To test this HTML in a browser, the API Key MUST NOT have "Android" or "iOS" restrictions. If it does, testing in a web browser will fail with CORS/Referer errors. -->
<script async defer
    src="https://maps.googleapis.com/maps/api/js?key=AIzaSyD8v8YG7Zj7XizFobVTl7OGxjQgq7BCKHI&libraries=places,marker&loading=async&callback=initMap">
</script>

</body>
</html>
